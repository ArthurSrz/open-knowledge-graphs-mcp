  </g>
  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="600" fill="#1a1a1a">Open Knowledge Graphs</text>
  <!-- Subtitle -->
  <text x="600" y="475" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#888888">openknowledgegraphs.com</text>
